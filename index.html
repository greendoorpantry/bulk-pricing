<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk Price Lookup</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #111827;
      --bg-card: #1a2332;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --accent-green: #10b981;
      --accent-blue: #3b82f6;
      --accent-orange: #f59e0b;
      --border: #2d3748;
      --shadow: rgba(0, 0, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
    }

    .mode-toggle {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .mode-btn {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue);
    }

    .header .status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .search-section {
      background: var(--bg-card);
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px var(--shadow);
    }

    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }

    .input-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .barcode-input {
      width: 100%;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.125rem;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      transition: all 0.2s;
    }

    .barcode-input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.875rem 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: var(--accent-blue);
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg-primary);
    }

    .btn-settings {
      width: 100%;
      margin-top: 0.75rem;
      background: transparent;
      color: var(--text-secondary);
      border: 1px dashed var(--border);
    }

    .btn-settings:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    .result-card {
      background: var(--bg-card);
      border-radius: 1rem;
      padding: 2rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px var(--shadow);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .product-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      line-height: 1.3;
    }

    .info-grid {
      display: grid;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border-radius: 0.5rem;
    }

    .info-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .info-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .price-section {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 2px solid var(--border);
    }

    .price-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .price-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent-green);
      line-height: 1;
    }

    .savings-section {
      background: rgba(16, 185, 129, 0.1);
      border: 2px solid var(--accent-green);
      border-radius: 0.75rem;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .savings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .savings-item {
      text-align: center;
    }

    .savings-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .savings-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-green);
    }

    .tax-button {
      width: 100%;
      padding: 1.25rem;
      font-size: 1rem;
      font-weight: 700;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid var(--border);
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: relative;
      overflow: hidden;
    }

    .tax-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--accent-orange);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: 0;
    }

    .tax-button span {
      position: relative;
      z-index: 1;
    }

    .tax-button.active::before {
      transform: scaleX(1);
    }

    .tax-button.active {
      border-color: var(--accent-orange);
      color: white;
    }

    .tax-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.3);
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid #ef4444;
      border-radius: 0.75rem;
      padding: 1.5rem;
      color: #fca5a5;
      text-align: center;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .settings-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      padding: 1rem;
      overflow-y: auto;
    }

    .settings-modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-content {
      background: var(--bg-card);
      border-radius: 1rem;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      border: 1px solid var(--border);
      animation: slideIn 0.3s ease-out;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .settings-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
    }

    .close-btn:hover {
      color: var(--text-primary);
    }

    textarea {
      width: 100%;
      min-height: 200px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-blue);
    }

    .hidden {
      display: none;
    }

    /* Stock Take Styles */
    .stock-input-section {
      background: var(--bg-card);
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px var(--shadow);
    }

    .stock-form {
      display: grid;
      gap: 1rem;
    }

    .quantity-input {
      width: 100%;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      text-align: center;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      transition: all 0.2s;
    }

    .quantity-input:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .stock-list {
      background: var(--bg-card);
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px var(--shadow);
      max-height: 400px;
      overflow-y: auto;
    }

    .stock-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .stock-list-header h3 {
      font-size: 1.125rem;
      font-weight: 700;
    }

    .stock-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      padding: 0.25rem 0.75rem;
      border-radius: 0.25rem;
    }

    .stock-item {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      animation: slideIn 0.3s ease-out;
    }

    .stock-item-info {
      flex: 1;
      min-width: 140px;
    }

    .stock-item-name {
      font-weight: 600;
      font-size: 0.875rem;
      margin-bottom: 0.15rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 220px;
    }

    .stock-item-barcode {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .stock-item-fields {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .stock-field {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stock-field label {
      font-size: 0.6rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .stock-inline-input {
      width: 56px;
      padding: 0.3rem;
      text-align: center;
      border: 1px solid var(--border-color);
      border-radius: 0.375rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .stock-rrp-input {
      width: 68px;
    }

    .stock-inline-input:focus {
      border-color: var(--accent-green);
      outline: none;
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
    }

    .stock-rrp-adjusted {
      color: #f59e0b !important;
      border-color: #f59e0b !important;
    }

    .stock-item-remove {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid #ef4444;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
    }

    .stock-item-remove:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .stock-item-qty {
      display: none;
    }

    .stock-preview {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
    }

    .stock-preview.not-found {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .stock-preview-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent-green);
      margin-bottom: 0.25rem;
    }

    .stock-preview.not-found .stock-preview-name {
      color: #ef4444;
    }

    .stock-preview-details {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .stock-preview-details span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .stock-preview-details strong {
      color: var(--text-primary);
    }

    .stock-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .btn-export {
      background: var(--accent-green);
      color: white;
    }

    .btn-export:hover {
      background: #059669;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-clear-all {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .btn-clear-all:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    @media (max-width: 640px) {
      .stock-item {
        flex-wrap: wrap;
      }

      .stock-item-info {
        width: 100%;
        min-width: unset;
      }

      .stock-item-name {
        max-width: none;
      }

      .stock-item-fields {
        width: 100%;
        justify-content: space-between;
      }
    }

    @media (max-width: 640px) {
      .btn-group {
        grid-template-columns: 1fr;
      }

      .price-value {
        font-size: 2rem;
      }

      .savings-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Bulk Price Lookup</h1>
      <div class="mode-toggle">
        <button class="mode-btn active" id="pricingModeBtn">💰 Pricing</button>
        <button class="mode-btn" id="stockModeBtn">📦 Stock Take</button>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        <span id="statusText">Ready</span>
      </div>
    </div>

    <div class="search-section">
      <div class="input-group">
        <label for="barcodeInput">Barcode / PLU</label>
        <input 
          type="text" 
          id="barcodeInput" 
          class="barcode-input" 
          placeholder="Scan or type barcode..."
          autocomplete="off"
          autofocus
          enterkeyhint="search"
        >
        <button class="btn btn-secondary" id="cameraScanBtn" style="margin-top: 0.5rem; width: 100%;">📷 Scan with Camera</button>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="searchBtn">Search</button>
        <button class="btn btn-secondary" id="clearBtn">Clear</button>
      </div>
      <button class="btn btn-settings" id="settingsBtn">⚙️ Settings & Update Data</button>
    </div>

    <!-- Stock Take Section -->
    <div class="stock-input-section hidden" id="stockSection">
      <div class="input-group">
        <label for="stockBarcodeInput">Scan Product</label>
        <input 
          type="text" 
          id="stockBarcodeInput" 
          class="barcode-input" 
          placeholder="Scan barcode..."
          autocomplete="off"
        >
        <button class="btn btn-secondary" id="stockCameraScanBtn" style="margin-top: 0.5rem; width: 100%;">📷 Scan with Camera</button>
      </div>
      <!-- Product preview after scan -->
      <div id="stockProductPreview" class="stock-preview hidden"></div>
      <div class="input-group">
        <label for="quantityInput">Quantity in Stock</label>
        <input 
          type="number" 
          id="quantityInput" 
          class="quantity-input" 
          inputmode="numeric"
          pattern="[0-9]*"
          placeholder="0"
          min="0"
          step="1"
          autocomplete="off"
        >
      </div>
      <button class="btn btn-primary" id="addStockBtn" style="width: 100%;">Add to Stock Take</button>
    </div>

    <div id="resultContainer"></div>

    <!-- Stock List -->
    <div class="stock-list hidden" id="stockList">
      <div class="stock-list-header">
        <h3>Stock Items</h3>
        <span class="stock-count"><span id="stockItemCount">0</span> items</span>
      </div>
      <div id="stockItemsContainer">
        <div class="empty-state">
          <div class="empty-state-icon">📦</div>
          <p>No items scanned yet</p>
        </div>
      </div>
      <div class="stock-actions">
        <button class="btn btn-export" id="exportBtn">📥 Export to Excel</button>
        <button class="btn btn-clear-all" id="clearAllBtn">🗑️ Clear All</button>
      </div>
    </div>
  </div>

  <div class="settings-modal" id="settingsModal">
    <div class="settings-content">
      <div class="settings-header">
        <h2>Settings</h2>
        <button class="close-btn" id="closeSettingsBtn">×</button>
      </div>
      <div class="input-group">
        <label>Google Drive JSON URL</label>
        <input 
          type="text" 
          id="dataUrlInput" 
          class="barcode-input" 
          placeholder="https://drive.google.com/uc?export=download&id=..."
          style="font-size: 0.875rem;"
        >
      </div>
      <div class="btn-group" style="margin-top: 1rem;">
        <button class="btn btn-primary" id="saveUrlBtn">Save URL</button>
        <button class="btn btn-secondary" id="fetchDataBtn">Fetch Data Now</button>
      </div>
      <div class="input-group" style="margin-top: 1.5rem;">
        <label>Or Paste JSON Data Manually</label>
        <textarea id="manualDataInput" placeholder='{"version": "1.0", "products": [...]}'></textarea>
      </div>
      <button class="btn btn-primary" id="saveManualDataBtn" style="width: 100%; margin-top: 1rem;">Load Manual Data</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script>
    // State management
    let productsData = [];
    let currentProduct = null;
    let taxMode = false;
    let dataUrl = 'https://greendoorpantry.github.io/bulk-pricing/data/bulk_pricing_data.json';
    let currentMode = 'pricing'; // 'pricing' or 'stock'
    let stockItems = [];

    // DOM elements
    const barcodeInput = document.getElementById('barcodeInput');
    const searchBtn = document.getElementById('searchBtn');
    const clearBtn = document.getElementById('clearBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const resultContainer = document.getElementById('resultContainer');
    const statusText = document.getElementById('statusText');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const dataUrlInput = document.getElementById('dataUrlInput');
    const saveUrlBtn = document.getElementById('saveUrlBtn');
    const fetchDataBtn = document.getElementById('fetchDataBtn');
    const manualDataInput = document.getElementById('manualDataInput');
    const saveManualDataBtn = document.getElementById('saveManualDataBtn');
    
    // Mode toggle elements
    const pricingModeBtn = document.getElementById('pricingModeBtn');
    const stockModeBtn = document.getElementById('stockModeBtn');
    const searchSection = document.querySelector('.search-section');
    const stockSection = document.getElementById('stockSection');
    const stockList = document.getElementById('stockList');
    
    // Stock take elements
    const stockBarcodeInput = document.getElementById('stockBarcodeInput');
    const quantityInput = document.getElementById('quantityInput');
    const addStockBtn = document.getElementById('addStockBtn');
    const stockItemsContainer = document.getElementById('stockItemsContainer');
    const stockItemCount = document.getElementById('stockItemCount');
    const exportBtn = document.getElementById('exportBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    
    // Camera scan button
    const cameraScanBtn = document.getElementById('cameraScanBtn');
    const stockCameraScanBtn = document.getElementById('stockCameraScanBtn');

    // Initialize
    init();

    function init() {
      loadFromStorage();
      setupEventListeners();
      if (dataUrl) {
        fetchDataFromUrl();
      }
      loadStockItems();
    }

    function setupEventListeners() {
      barcodeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          searchProduct();
        }
      });

      searchBtn.addEventListener('click', searchProduct);
      clearBtn.addEventListener('click', clearSearch);
      settingsBtn.addEventListener('click', () => settingsModal.classList.add('active'));
      closeSettingsBtn.addEventListener('click', () => settingsModal.classList.remove('active'));
      saveUrlBtn.addEventListener('click', saveDataUrl);
      fetchDataBtn.addEventListener('click', fetchDataFromUrl);
      saveManualDataBtn.addEventListener('click', loadManualData);
      
      // Mode toggle
      pricingModeBtn.addEventListener('click', () => switchMode('pricing'));
      stockModeBtn.addEventListener('click', () => switchMode('stock'));
      
      // Stock take events
      stockBarcodeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          showStockPreview();
          quantityInput.focus();
        }
      });

      // Also show preview on input change (for camera scan)
      stockBarcodeInput.addEventListener('input', () => {
        const val = stockBarcodeInput.value.trim();
        if (val.length >= 8) {
          showStockPreview();
        } else {
          const preview = document.getElementById('stockProductPreview');
          preview.classList.add('hidden');
        }
      });
      
      quantityInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addStockItem();
        }
      });
      
      addStockBtn.addEventListener('click', addStockItem);
      exportBtn.addEventListener('click', exportToExcel);
      clearAllBtn.addEventListener('click', clearAllStock);
      
      // Camera scan
      cameraScanBtn.addEventListener('click', startCameraScan);
      stockCameraScanBtn.addEventListener('click', startStockCameraScan);
    }
    
    // Camera scanning
    let codeReader = null;
    let cameraPermissionGranted = false;
    
    // Pre-request camera permission on load for faster scanning
    async function prewarmCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        // Got permission - stop the stream immediately, we just wanted the permission
        stream.getTracks().forEach(track => track.stop());
        cameraPermissionGranted = true;
      } catch (e) {
        // Permission denied or not available - that's OK, we'll prompt when they tap scan
        console.log('Camera prewarm skipped:', e.message);
      }
    }
    
    // Prewarm camera permission after a short delay (don't block page load)
    setTimeout(prewarmCamera, 1000);
    
    // Barcode matching helper - handles leading zero differences (EAN-13 vs UPC-A)
    function findProductByBarcode(barcode) {
      const clean = barcode.replace(/[^a-zA-Z0-9-]/g, '');
      // Exact match
      let product = productsData.find(p => p.barcode === clean);
      if (product) return { product, barcode: clean };
      
      // Try without leading zeros
      if (clean.startsWith('0')) {
        product = productsData.find(p => p.barcode === clean.replace(/^0+/, ''));
        if (product) return { product, barcode: clean };
      }
      // Try with leading zero
      if (!clean.startsWith('0')) {
        product = productsData.find(p => p.barcode === '0' + clean);
        if (product) return { product, barcode: clean };
      }
      return { product: null, barcode: clean };
    }
    
    async function startCameraScan() {
      try {
        // Initialize code reader if not already done
        if (!codeReader) {
          codeReader = new ZXing.BrowserMultiFormatReader();
        }
        
        updateStatus('Starting camera...', 'loading');
        
        // Get video devices
        const videoInputDevices = await codeReader.listVideoInputDevices();
        
        if (videoInputDevices.length === 0) {
          updateStatus('No camera found', 'error');
          return;
        }
        
        // Use back camera if available (for mobile)
        const selectedDeviceId = videoInputDevices.find(device => 
          device.label.toLowerCase().includes('back')
        )?.deviceId || videoInputDevices[0].deviceId;
        
        // Create video element
        const videoElement = document.createElement('video');
        videoElement.style.width = '100%';
        videoElement.style.maxWidth = '400px';
        videoElement.style.border = '2px solid var(--accent-blue)';
        videoElement.style.borderRadius = '0.5rem';
        
        // Show video in modal
        const scanModal = document.createElement('div');
        scanModal.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0,0,0,0.9);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          padding: 1rem;
        `;
        
        const closeBtn = document.createElement('button');
        closeBtn.textContent = '✕ Close Camera';
        closeBtn.className = 'btn btn-secondary';
        closeBtn.style.marginTop = '1rem';
        
        scanModal.appendChild(videoElement);
        scanModal.appendChild(closeBtn);
        document.body.appendChild(scanModal);
        
        // Start scanning
        codeReader.decodeFromVideoDevice(selectedDeviceId, videoElement, (result, err) => {
          if (result) {
            // Got a barcode!
            const barcode = result.text;
            barcodeInput.value = barcode;
            
            // Stop camera
            codeReader.reset();
            document.body.removeChild(scanModal);
            
            // Search automatically
            searchProduct();
            updateStatus('Barcode scanned!', 'success');
          }
        });
        
        updateStatus('Point camera at barcode', 'info');
        
        // Close button
        closeBtn.onclick = () => {
          codeReader.reset();
          document.body.removeChild(scanModal);
          updateStatus('Camera closed', 'info');
        };
        
      } catch (error) {
        console.error('Camera error:', error);
        updateStatus('Camera access denied or not available', 'error');
      }
    }
    
    // Stock take camera scanning
    async function startStockCameraScan() {
      try {
        if (!codeReader) {
          codeReader = new ZXing.BrowserMultiFormatReader();
        }
        
        updateStatus('Starting camera...', 'loading');
        
        const videoInputDevices = await codeReader.listVideoInputDevices();
        
        if (videoInputDevices.length === 0) {
          updateStatus('No camera found', 'error');
          return;
        }
        
        const selectedDeviceId = videoInputDevices.find(device => 
          device.label.toLowerCase().includes('back')
        )?.deviceId || videoInputDevices[0].deviceId;
        
        const videoElement = document.createElement('video');
        videoElement.style.width = '100%';
        videoElement.style.maxWidth = '400px';
        videoElement.style.border = '2px solid var(--accent-blue)';
        videoElement.style.borderRadius = '0.5rem';
        
        const scanModal = document.createElement('div');
        scanModal.id = 'stockScanModal';
        scanModal.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0,0,0,0.95);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          padding: 1rem;
          gap: 0.75rem;
        `;
        
        // Product info area (shows after scan)
        const productInfo = document.createElement('div');
        productInfo.id = 'scanProductInfo';
        productInfo.style.cssText = `
          width: 100%;
          max-width: 400px;
          display: none;
          text-align: center;
        `;

        // Quantity input area (shows after scan)
        const qtyArea = document.createElement('div');
        qtyArea.id = 'scanQtyArea';
        qtyArea.style.cssText = `
          width: 100%;
          max-width: 400px;
          display: none;
          gap: 0.5rem;
          flex-direction: column;
          align-items: center;
        `;
        qtyArea.innerHTML = `
          <label style="color: #a0aec0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Quantity in Stock</label>
          <input type="number" inputmode="numeric" pattern="[0-9]*" id="scanQtyInput" 
            style="width: 120px; padding: 0.75rem; text-align: center; font-size: 1.5rem; font-weight: 700; 
            border: 2px solid var(--accent-green, #10b981); border-radius: 0.5rem; background: #1a202c; color: white;"
            placeholder="0" min="0" step="1" autocomplete="off">
          <button id="scanAddBtn" class="btn btn-primary" 
            style="width: 100%; max-width: 200px; padding: 0.75rem; font-size: 1rem; margin-top: 0.25rem;">
            Add to Stock Take
          </button>
        `;
        
        const closeBtn = document.createElement('button');
        closeBtn.textContent = '✕ Close';
        closeBtn.className = 'btn btn-secondary';
        closeBtn.style.marginTop = '0.5rem';
        
        scanModal.appendChild(videoElement);
        scanModal.appendChild(productInfo);
        scanModal.appendChild(qtyArea);
        scanModal.appendChild(closeBtn);
        document.body.appendChild(scanModal);
        
        let currentScannedProduct = null;
        let currentScannedBarcode = null;
        
        const startDecoding = () => {
          videoElement.style.display = '';
          productInfo.style.display = 'none';
          qtyArea.style.display = 'none';
          updateStatus('Point camera at barcode', 'info');
          
          codeReader.decodeFromVideoDevice(selectedDeviceId, videoElement, (result, err) => {
            if (result) {
              const barcode = result.text;
              codeReader.reset();
              
              // Look up product
              const { product, barcode: cleanBarcode } = findProductByBarcode(barcode);
              currentScannedBarcode = cleanBarcode;
              currentScannedProduct = product;
              
              // Hide video, show product info
              videoElement.style.display = 'none';
              
              if (product) {
                const existingItem = stockItems.find(item => item.barcode === cleanBarcode);
                const existingNote = existingItem 
                  ? `<div style="margin-top: 0.4rem; font-size: 0.85rem; color: #f59e0b;">Already counted: ${existingItem.quantity} — new quantity will be added</div>` 
                  : '';
                productInfo.innerHTML = `
                  <div style="background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); border-radius: 0.5rem; padding: 0.75rem;">
                    <div style="font-weight: 700; font-size: 1.1rem; color: #10b981; margin-bottom: 0.3rem;">${product.name}</div>
                    <div style="display: flex; justify-content: center; gap: 1rem; font-size: 0.85rem; color: #a0aec0; flex-wrap: wrap;">
                      <span>Supplier: <strong style="color: white;">${product.supplier || 'N/A'}</strong></span>
                      <span>RRP: <strong style="color: white;">\u20AC${product.unitPrice.toFixed(2)}</strong></span>
                      <span>Case: <strong style="color: white;">${product.caseQty}</strong></span>
                      <span>Bulk: <strong style="color: #10b981;">\u20AC${product.bulkPrice.toFixed(2)}</strong></span>
                    </div>
                    ${existingNote}
                  </div>
                `;
                productInfo.style.display = 'block';
                qtyArea.style.display = 'flex';
                
                const qtyInput = document.getElementById('scanQtyInput');
                qtyInput.value = '';
                qtyInput.focus();
                
                updateStatus(`Found: ${product.name}`, 'success');
              } else {
                productInfo.innerHTML = `
                  <div style="background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); border-radius: 0.5rem; padding: 0.75rem;">
                    <div style="font-weight: 700; font-size: 1rem; color: #ef4444;">Product not found</div>
                    <div style="font-size: 0.85rem; color: #a0aec0;">Barcode: ${cleanBarcode}</div>
                  </div>
                `;
                productInfo.style.display = 'block';
                qtyArea.style.display = 'none';
                
                updateStatus(`Not found: ${cleanBarcode}`, 'error');
                
                // Auto-restart scanning after 2 seconds
                setTimeout(() => startDecoding(), 2000);
              }
            }
          });
        };
        
        // Start scanning
        startDecoding();
        
        // Add button handler
        const handleAdd = () => {
          const qtyInput = document.getElementById('scanQtyInput');
          const quantity = parseInt(qtyInput.value);
          
          if (!currentScannedProduct || isNaN(quantity) || quantity < 0) {
            updateStatus('Enter a valid quantity', 'error');
            qtyInput.focus();
            return;
          }
          
          // Add to stock list - ADD to existing quantity if scanned again
          const existingIndex = stockItems.findIndex(item => item.barcode === currentScannedBarcode);
          if (existingIndex >= 0) {
            stockItems[existingIndex].quantity += quantity;
            updateStatus(`Updated: ${currentScannedProduct.name} (total: ${stockItems[existingIndex].quantity})`, 'success');
          } else {
            stockItems.push({
              barcode: currentScannedBarcode,
              name: currentScannedProduct.name,
              supplier: currentScannedProduct.supplier || 'N/A',
              rrp: currentScannedProduct.unitPrice || 0,
              adjustedRrp: currentScannedProduct.unitPrice || 0,
              quantity: quantity
            });
            updateStatus(`Added: ${currentScannedProduct.name}`, 'success');
          }
          
          saveStockItems();
          renderStockList();
          
          // Reset and restart camera for next scan
          currentScannedProduct = null;
          currentScannedBarcode = null;
          startDecoding();
        };
        
        // Handle Add button click
        scanModal.querySelector('#scanAddBtn').addEventListener('click', handleAdd);
        
        // Handle Enter key on qty input
        scanModal.querySelector('#scanQtyInput').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            handleAdd();
          }
        });
        
        closeBtn.onclick = () => {
          codeReader.reset();
          document.body.removeChild(scanModal);
          updateStatus(`${stockItems.length} items in stock take`, 'info');
        };
        
      } catch (error) {
        console.error('Camera error:', error);
        updateStatus('Camera access denied or not available', 'error');
      }
    }

    function switchMode(mode) {
      currentMode = mode;
      
      if (mode === 'pricing') {
        pricingModeBtn.classList.add('active');
        stockModeBtn.classList.remove('active');
        searchSection.classList.remove('hidden');
        stockSection.classList.add('hidden');
        stockList.classList.add('hidden');
        resultContainer.classList.remove('hidden');
        barcodeInput.focus();
      } else {
        stockModeBtn.classList.add('active');
        pricingModeBtn.classList.remove('active');
        searchSection.classList.add('hidden');
        stockSection.classList.remove('hidden');
        stockList.classList.remove('hidden');
        resultContainer.classList.add('hidden');
        stockBarcodeInput.focus();
      }
      
      updateStatus(`${mode === 'pricing' ? 'Pricing' : 'Stock Take'} mode`, 'info');
    }

    function showStockPreview() {
      const barcode = stockBarcodeInput.value.trim();
      const preview = document.getElementById('stockProductPreview');
      
      if (!barcode) {
        preview.classList.add('hidden');
        return;
      }

      const { product, barcode: cleanBarcode } = findProductByBarcode(barcode);

      if (product) {
        preview.className = 'stock-preview';
        preview.innerHTML = `
          <div class="stock-preview-name">${product.name}</div>
          <div class="stock-preview-details">
            <span>Supplier: <strong>${product.supplier || 'N/A'}</strong></span>
            <span>RRP: <strong>\u20AC${product.unitPrice.toFixed(2)}</strong></span>
            <span>Case Qty: <strong>${product.caseQty}</strong></span>
            <span>Bulk: <strong>\u20AC${product.bulkPrice.toFixed(2)}</strong></span>
          </div>
        `;
        updateStatus(`Barcode scanned! Enter quantity`, 'success');
      } else {
        preview.className = 'stock-preview not-found';
        preview.innerHTML = `
          <div class="stock-preview-name">Product not found</div>
          <div class="stock-preview-details">
            <span>Barcode: <strong>${cleanBarcode}</strong></span>
          </div>
        `;
        updateStatus(`Product not found: ${cleanBarcode}`, 'error');
      }
    }

    function addStockItem() {
      const barcode = stockBarcodeInput.value.trim();
      const quantity = parseInt(quantityInput.value);
      
      if (!barcode) {
        updateStatus('Please scan a barcode', 'error');
        return;
      }
      
      if (isNaN(quantity) || quantity < 0) {
        updateStatus('Please enter a valid quantity', 'error');
        return;
      }
      
      // Clean barcode - remove any non-alphanumeric except hyphens
      const { product, barcode: cleanBarcode } = findProductByBarcode(barcode);
      
      if (!product) {
        updateStatus(`Product not found: ${cleanBarcode}`, 'error');
        return;
      }
      
      // Check if already exists - ADD to existing quantity (for multiple locations)
      const existingIndex = stockItems.findIndex(item => item.barcode === cleanBarcode);
      
      if (existingIndex >= 0) {
        stockItems[existingIndex].quantity += quantity;
        updateStatus(`Updated: ${product.name} (total: ${stockItems[existingIndex].quantity})`, 'success');
      } else {
        stockItems.push({
          barcode: cleanBarcode,
          name: product.name,
          supplier: product.supplier || 'N/A',
          rrp: product.unitPrice || 0,
          adjustedRrp: product.unitPrice || 0,
          quantity: quantity
        });
        updateStatus(`Added: ${product.name}`, 'success');
      }
      
      saveStockItems();
      renderStockList();
      
      // Clear inputs and focus back to barcode
      stockBarcodeInput.value = '';
      quantityInput.value = '';
      document.getElementById('stockProductPreview').classList.add('hidden');
      stockBarcodeInput.focus();
    }

    function renderStockList() {
      stockItemCount.textContent = stockItems.length;
      
      if (stockItems.length === 0) {
        stockItemsContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📦</div>
            <p>No items scanned yet</p>
          </div>
        `;
        return;
      }
      
      stockItemsContainer.innerHTML = stockItems.map((item, index) => `
        <div class="stock-item">
          <div class="stock-item-info">
            <div class="stock-item-name">${item.name}</div>
            <div class="stock-item-barcode">${item.barcode} · ${item.supplier || 'N/A'}</div>
          </div>
          <div class="stock-item-fields">
            <div class="stock-field">
              <label>Qty</label>
              <input type="number" class="stock-inline-input" value="${item.quantity}" min="0" 
                onchange="updateStockField(${index}, 'quantity', this.value)">
            </div>
            <div class="stock-field">
              <label>RRP</label>
              <input type="number" class="stock-inline-input stock-rrp-input" value="${(item.adjustedRrp || item.rrp || 0).toFixed(2)}" min="0" step="0.01"
                onchange="updateStockField(${index}, 'adjustedRrp', this.value)"
                ${item.adjustedRrp !== item.rrp ? 'style="color: #e67e22; font-weight: bold;"' : ''}>
            </div>
            <button class="stock-item-remove" onclick="removeStockItem(${index})">✕</button>
          </div>
        </div>
      `).join('');
    }

    function updateStockField(index, field, value) {
      if (field === 'quantity') {
        stockItems[index].quantity = parseInt(value) || 0;
      } else if (field === 'adjustedRrp') {
        stockItems[index].adjustedRrp = parseFloat(value) || 0;
      }
      saveStockItems();
      // Don't re-render to avoid losing focus, just save
    }

    function removeStockItem(index) {
      stockItems.splice(index, 1);
      saveStockItems();
      renderStockList();
      updateStatus('Item removed', 'info');
    }

    function clearAllStock() {
      if (stockItems.length === 0) return;
      
      if (confirm(`Clear all ${stockItems.length} items from stock take?`)) {
        stockItems = [];
        saveStockItems();
        renderStockList();
        updateStatus('Stock take cleared', 'info');
      }
    }

    function saveStockItems() {
      localStorage.setItem('stockTakeItems', JSON.stringify(stockItems));
    }

    function loadStockItems() {
      const stored = localStorage.getItem('stockTakeItems');
      if (stored) {
        try {
          stockItems = JSON.parse(stored);
          renderStockList();
        } catch (e) {
          console.error('Error loading stock items:', e);
        }
      }
    }

    function exportToExcel() {
      if (stockItems.length === 0) {
        updateStatus('No items to export', 'error');
        return;
      }
      
      // Prepare data for Excel
      const excelData = stockItems.map(item => ({
        'Product Name': item.name,
        'Barcode': item.barcode,
        'Supplier': item.supplier || 'N/A',
        'Current Stock': item.quantity,
        'Original RRP': item.rrp ? item.rrp.toFixed(2) : '0.00',
        'Adjusted RRP': item.adjustedRrp ? item.adjustedRrp.toFixed(2) : (item.rrp ? item.rrp.toFixed(2) : '0.00'),
        'RRP Changed': item.adjustedRrp !== item.rrp ? 'YES' : ''
      }));
      
      // Create workbook and worksheet
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.json_to_sheet(excelData);
      
      // Set column widths
      ws['!cols'] = [
        { wch: 35 }, // Product Name
        { wch: 15 }, // Barcode
        { wch: 15 }, // Supplier
        { wch: 14 }, // Current Stock
        { wch: 12 }, // Original RRP
        { wch: 12 }, // Adjusted RRP
        { wch: 12 }  // RRP Changed
      ];
      
      XLSX.utils.book_append_sheet(wb, ws, 'Stock Take');
      
      // Generate filename with date
      const date = new Date().toISOString().split('T')[0];
      const filename = `stock_take_${date}.xlsx`;
      
      // Download
      XLSX.writeFile(wb, filename);
      
      updateStatus(`Exported ${stockItems.length} items`, 'success');
    }

    function loadFromStorage() {
      const stored = localStorage.getItem('bulkPricingData');
      if (stored) {
        try {
          const data = JSON.parse(stored);
          productsData = data.products || [];
          updateStatus(`${productsData.length} products loaded`, 'success');
        } catch (e) {
          updateStatus('Error loading stored data', 'error');
        }
      }

      const storedUrl = localStorage.getItem('dataUrl');
      if (storedUrl) {
        dataUrl = storedUrl;
      }
      dataUrlInput.value = dataUrl;
    }

    function saveDataUrl() {
      dataUrl = dataUrlInput.value.trim();
      localStorage.setItem('dataUrl', dataUrl);
      updateStatus('URL saved', 'success');
      fetchDataFromUrl();
    }

    async function fetchDataFromUrl() {
      if (!dataUrl) {
        updateStatus('No data URL configured', 'error');
        return;
      }

      updateStatus('Fetching data...', 'loading');

      try {
        let response;
        
        if (dataUrl.includes('drive.google.com') || dataUrl.includes('docs.google.com')) {
          // Try multiple CORS proxies as fallbacks
          const corsProxies = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
          ];
          
          let lastError;
          for (const proxy of corsProxies) {
            try {
              response = await fetch(proxy + encodeURIComponent(dataUrl));
              if (response.ok) break;
            } catch (e) {
              lastError = e;
              continue;
            }
          }
          
          if (!response || !response.ok) {
            throw lastError || new Error('All CORS proxies failed');
          }
        } else {
          response = await fetch(dataUrl);
          if (!response.ok) throw new Error('Failed to fetch');
        }
        
        const data = await response.json();
        productsData = data.products || [];
        
        localStorage.setItem('bulkPricingData', JSON.stringify(data));
        updateStatus(`${productsData.length} products loaded`, 'success');
        settingsModal.classList.remove('active');
      } catch (error) {
        // If fetch fails but we have cached data, use it
        if (productsData.length > 0) {
          updateStatus(`Using cached data (${productsData.length} products) - refresh failed`, 'info');
        } else {
          updateStatus('Failed to fetch data from URL', 'error');
        }
        console.error(error);
      }
    }

    function loadManualData() {
      try {
        const data = JSON.parse(manualDataInput.value);
        productsData = data.products || [];
        
        localStorage.setItem('bulkPricingData', JSON.stringify(data));
        updateStatus(`${productsData.length} products loaded`, 'success');
        manualDataInput.value = '';
        settingsModal.classList.remove('active');
      } catch (error) {
        updateStatus('Invalid JSON data', 'error');
      }
    }

    function updateStatus(message, type = 'info') {
      statusText.textContent = message;
      const dot = document.querySelector('.status-dot');
      
      switch(type) {
        case 'success':
          dot.style.background = '#10b981';
          break;
        case 'error':
          dot.style.background = '#ef4444';
          break;
        case 'loading':
          dot.style.background = '#3b82f6';
          break;
        default:
          dot.style.background = '#9ca3af';
      }
    }

    function searchProduct() {
      const barcode = barcodeInput.value.trim();
      
      if (!barcode) {
        showError('Please enter a barcode');
        return;
      }

      if (productsData.length === 0) {
        showError('No product data loaded. Please configure data source in settings.');
        return;
      }

      // Clean barcode and find product (handles EAN-13/UPC-A differences)
      const { product, barcode: cleanBarcode } = findProductByBarcode(barcode);
      
      if (product) {
        currentProduct = product;
        taxMode = false;
        displayProduct(product);
        updateStatus('Product found', 'success');
      } else {
        showError(`Product not found: ${cleanBarcode}`);
      }
    }

    function displayProduct(product) {
      const bulkPrice = taxMode ? product.taxBulkPrice : product.bulkPrice;
      const customerSaves = taxMode ? product.taxCustomerSaves : product.customerSaves;
      const discountPct = taxMode ? product.taxDiscountPct : product.discountPct;

      resultContainer.innerHTML = `
        <div class="result-card">
          <h2 class="product-name">${product.name}</h2>
          
          <div class="info-grid">
            <div class="info-row">
              <span class="info-label">Supplier</span>
              <span class="info-value">${product.supplier}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Order Code</span>
              <span class="info-value">${product.supplierCode || 'N/A'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Case Quantity</span>
              <span class="info-value">${product.caseQty} units</span>
            </div>
            <div class="info-row">
              <span class="info-label">Unit Price</span>
              <span class="info-value">€${product.unitPrice.toFixed(2)}</span>
            </div>
          </div>

          <div class="price-section">
            <div class="price-label">Bulk Case Price</div>
            <div class="price-value">€${bulkPrice.toFixed(2)}</div>
          </div>

          <div class="savings-section">
            <div class="savings-grid">
              <div class="savings-item">
                <div class="savings-label">Customer Saves</div>
                <div class="savings-value">€${customerSaves.toFixed(2)}</div>
              </div>
              <div class="savings-item">
                <div class="savings-label">Discount</div>
                <div class="savings-value">${discountPct.toFixed(1)}%</div>
              </div>
            </div>
          </div>

          <button class="tax-button ${taxMode ? 'active' : ''}" id="taxToggle">
            <span>${taxMode ? '✓ TAX MODE - 10% MIN' : 'TAX - FORCE 10% MIN'}</span>
          </button>
        </div>
      `;

      // Attach tax toggle event
      document.getElementById('taxToggle').addEventListener('click', toggleTaxMode);
    }

    function toggleTaxMode() {
      taxMode = !taxMode;
      displayProduct(currentProduct);
    }

    function showError(message) {
      resultContainer.innerHTML = `
        <div class="error-message">
          <strong>⚠️ ${message}</strong>
        </div>
      `;
      updateStatus('Error', 'error');
    }

    function clearSearch() {
      barcodeInput.value = '';
      resultContainer.innerHTML = '';
      currentProduct = null;
      taxMode = false;
      barcodeInput.focus();
      updateStatus('Ready', 'info');
    }

    // Auto-fetch on page load if URL is configured - always refresh
    window.addEventListener('load', () => {
      if (dataUrl) {
        fetchDataFromUrl();
      }
    });
  </script>
</body>
</html>
